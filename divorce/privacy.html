    <h1>提交前，先了解一下</h1>
    <div class="legal-card">
      <h2>會收集咩資料</h2>
      <p>表單會收集你主動提供的稱呼、電話、婚姻概況、財產情況及基本背景資料，用作初步聯絡與分流。</p>
      <h2>資料點樣用</h2>
      <p>資料只用於初步了解、案件分流與後續回覆，不作其他用途。</p>
      <h2>會唔會公開</h2>
      <p>唔會。資料不會對外公開，亦不會用於與本次查詢無關的推廣。</p>
      <h2>提交前提醒</h2>
      <p>唔好提交完整身份證、銀行資料等不必要內容。一般提供雙方所在地、結婚地、主要財產及目前分歧已足夠。呢頁主要聚焦內地與香港之間、涉及財產分割的離婚安排；純香港本地離婚或單純離婚程序，本頁不承辦，亦不構成正式法律意見。</p>
    </div>
