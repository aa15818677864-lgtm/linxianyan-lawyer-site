    <div class="legal-card">
      <h2>收集哪些信息</h2>
      <p>当你提交咨询表单时，页面会收集你主动填写的称呼、联系方式、房产所在城市、咨询方向、案件简述，以及基础来源信息。</p>
      <h2>信息如何使用</h2>
      <p>这些信息将用于初步联系、案件情况筛选、后续沟通安排，并同步记录至 Google 表格。</p>
      <h2>不会如何使用</h2>
      <p>页面不会把你的表单内容用于与本次咨询无关的营销传播，也不会对外公开你的个案信息。</p>
      <h2>重要提示</h2>
      <p>请不要在表单中填写与你无关的他人敏感信息，也不要上传身份证号、银行卡号等不必要内容。本页面仅用于法律服务介绍与咨询收集，不构成正式法律意见。</p>
